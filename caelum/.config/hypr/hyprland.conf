### DEFAULTS ###
$terminal = foot 
$fileManager = nautilus 
$menu = ~/scripts/appc.sh 
$mainMod = SUPER 

### SOURCING ###
source = ~/.config/hypr/conf/binds.conf
source = ~/.config/hypr/conf/styles.conf
source = ~/.config/hypr/conf/general.conf
source = ~/.config/hypr/conf/autostart.conf
source = ~/.config/hypr/conf/rules.conf
source = ~/.config/hypr/colors.conf

# monitors
monitor=$displayMain,2560x1080@74.99,auto,auto
monitor=$displaySec,1920x1080@60,-1920x0,1

# envs
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
