general {
    gaps_in = 0
    gaps_out = 4

    border_size = 2
    col.active_border = rgba(f2f2f2ff)
    col.inactive_border = rgba(444444ff)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 1

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    pseudotile = false
    preserve_split = true
}

master {
    new_status = master
}
